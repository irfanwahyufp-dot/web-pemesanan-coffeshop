<!-- success.html -->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berhasil - Mas Amba</title>
    <link rel="stylesheet" href="style.css"> <!-- cite: 2 -->
</head>
<body>
    <div class="iphone-container"> <!-- cite: 2 -->
        <div class="iphone-notch"></div> <!-- cite: 2 -->
        <div class="iphone-screen" style="justify-content: space-between; text-align: center;"> <!-- cite: 2 -->
            
            <div></div>

            <div>
                <div style="width: 80px; height: 80px; background: #e8f5e9; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto;"> <!-- cite: 2 -->
                    <span style="font-size: 40px;">✅</span> <!-- cite: 2 -->
                </div>
                <h2 style="color: var(--primary-color); font-size: 22px;">Pesanan Dikirim!</h2> <!-- cite: 2 -->
                <p id="success-message-detail" style="font-size: 13px; color: var(--text-muted); margin-top: 10px; line-height: 1.5;"> <!-- cite: 2 -->
                    Mohon tunggu, barista kami sedang memproses pesanan kopi terbaik untuk Anda.
                </p>

                <div style="background: white; border-radius: 16px; padding: 15px; margin-top: 30px;"> <!-- cite: 2 -->
                    <div style="font-size: 11px; color: #aaa; text-transform: uppercase;">Nomor Antrean</div> <!-- cite: 2 -->
                    <div style="font-size: 36px; font-weight: 800; color: var(--primary-color);">#084</div> <!-- cite: 2 -->
                    <div style="font-size: 12px; color: var(--accent-color); font-weight: 600;" id="success-table-ref">Meja 05</div> <!-- cite: 2 -->
                </div>
            </div>

            <a href="index.html" class="btn-primary">Kembali ke Beranda</a> <!-- cite: 2 -->

        </div>
        <div class="iphone-home-bar"></div> <!-- cite: 2 -->
    </div>
    <script>
        const table = localStorage.getItem('table_number') || '05'; /* cite: 2 */
        const method = localStorage.getItem('payment_method') || 'digital'; /* cite: 2 */
        document.getElementById('success-table-ref').innerText = 'Meja ' + table; /* cite: 2 */
        
        // Kondisi jika harus bayar ke kasir
        if (method === 'kasir') { /* cite: 2 */
            document.getElementById('success-message-detail').innerHTML = 'Pesanan sudah tersimpan di sistem. <strong>Silakan langsung ke meja kasir</strong> untuk membayar agar pesanan langsung dibuat oleh barista.'; /* cite: 2 */
        }
    </script>
</body>
</html>
