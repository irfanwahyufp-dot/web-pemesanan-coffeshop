<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mas Amba - Sistem Pemesanan Digital</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="mobile-container">
        <div class="scroll-content">
            <!-- Header Mas Amba -->
            <div class="header-kedai">
                <img src="assets/images/logo.jpg" alt="Logo Mas Amba" class="logo-app" onerror="this.src='https://placehold.co/100x100?text=MA'">
                <div class="header-text">
                    <h2>Mas Amba</h2>
                    <p>🟢 Dine-In · Meja 01</p>
                </div>
            </div>

            <!-- Promo Banner -->
            <div class="promo-banner">
                <div class="promo-badge">PROMO HARI INI</div>
                <h3>Diskon PB1 Kopi Susu Aren<br>Spesial Meja!</h3>
                <p>Pesan langsung dari gawai Anda, hidangan siap meluncur ke meja.</p>
            </div>

            <!-- Kategori Tabs -->
            <div class="kategori-tabs">
                <button class="tab-btn active" onclick="filterKategori('semua', this)">📋 Semua</button>
                <button class="tab-btn" onclick="filterKategori('minuman', this)">☕ Minuman</button>
                <button class="tab-btn" onclick="filterKategori('snack', this)">🍟 Snack</button>
            </div>

            <h3 style="font-size: 15px; margin-bottom: 16px; color: #1e293b; font-weight: 800;">✨ Menu Rekomendasi</h3>
            
            <!-- Grid Menu Dinamis -->
            <div id="menu-container"></div>
        </div>

        <!-- Floating Cart Bar -->
        <div id="floating-cart" class="floating-cart" style="display: none;">
            <div>🛒 <span id="badge-count" style="font-weight: bold;">0</span> Item Terpilih</div>
            <a href="cart.html" class="view-cart-btn">Lihat Keranjang →</a>
        </div>

        <!-- Bottom Navigation Bar -->
        <div class="bottom-nav">
            <a href="index.html" class="nav-item active"><span>🏠</span>Home</a>
            <a href="cart.html" class="nav-item"><span>🛒</span>Keranjang</a>
            <a href="success.html" class="nav-item"><span>📋</span>Status</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
