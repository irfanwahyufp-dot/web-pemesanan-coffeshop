<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keranjang - Mas Amba</title>
    <link rel="stylesheet" href="style.css"> <!-- cite: 4 -->
</head>
<body>
    <div class="iphone-container"> <!-- cite: 4 -->
        <div class="iphone-notch"></div> <!-- cite: 4 -->
        <div class="iphone-screen" style="justify-content: space-between;"> <!-- cite: 4 -->
            
            <div>
                <div class="app-header"> <!-- cite: 4 -->
                    <a href="kasir.html" style="text-decoration: none; font-size: 20px;">⬅️</a> <!-- cite: 4 -->
                    <h2 class="app-title" style="flex: 1; text-align: center; margin-right: 20px;">Keranjang</h2> <!-- cite: 4 -->
                </div>

                <div id="cart-items-container" style="margin-top: 15px;"></div> <!-- cite: 4 -->

                <div class="summary-card"> <!-- cite: 4 -->
                    <div class="summary-row"> <!-- cite: 4 -->
                        <span>Subtotal</span> <!-- cite: 4 -->
                        <span id="subtotal-val">Rp 0</span> <!-- cite: 4 -->
                    </div>
                    <div class="summary-row"> <!-- cite: 4 -->
                        <span>Pajak (10%)</span> <!-- cite: 4 -->
                        <span id="tax-val">Rp 0</span> <!-- cite: 4 -->
                    </div>
                    <div class="summary-row summary-total"> <!-- cite: 4 -->
                        <span>Total Pembayaran</span> <!-- cite: 4 -->
                        <span id="total-val">Rp 0</span> <!-- cite: 4 -->
                    </div>
                </div>
            </div>

            <div style="margin-top: 20px;"> <!-- cite: 4 -->
                <a href="payment.html" class="btn-primary" style="display: block;">Pilih Metode Bayar</a> <!-- cite: 4 -->
            </div>

        </div>
        <div class="iphone-home-bar"></div> <!-- cite: 4 -->
    </div>
    <script src="script.js"></script> <!-- cite: 4 -->
</body>
</html>
