<!DOCTYPE html>
<html lang="id">
<head>

    <link rel="stylesheet" href="style.css"> <!-- cite: 6 -->
</head>
<body>
    <div class="iphone-container"> <!-- cite: 6 -->

        <div class="iphone-screen" style="justify-content: space-between;"> <!-- cite: 6 -->

                </div>
