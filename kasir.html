<!-- kasir.html -->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Mas Amba</title>
    <link rel="stylesheet" href="style.css"> <!-- cite: 5 -->
</head>
<body>
    <div class="iphone-container"> <!-- cite: 5 -->
        <div class="iphone-notch"></div> <!-- cite: 5 -->
        <div class="iphone-screen"> <!-- cite: 5 -->
            
            <div class="app-header"> <!-- cite: 5 -->
                <div>
                    <h2 class="app-title">Kopi Mas Amba</h2> <!-- cite: 5 -->
                    <p class="app-subtitle" id="table-display">Meja --</p> <!-- cite: 5 -->
                </div>
                <div style="background: #e6dfd9; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; color: var(--primary-color);">🟢 Dine-In</div> <!-- cite: 5 -->
            </div>

            <!-- Banner Promosi -->
            <div style="background: linear-gradient(135deg, #d4a373 0%, #b88755 100%); padding: 16px; border-radius: 18px; color: white; margin-bottom: 15px;"> <!-- cite: 5 -->
                <h4 style="font-size: 14px;">Promo Barcode Spesial! ☕</h4> <!-- cite: 5 -->
                <p style="font-size: 11px; opacity: 0.9; margin-top: 4px;">Pesan mandiri lebih cepat tanpa antre di kasir toko.</p> <!-- cite: 5 -->
            </div>

            <!-- Container Menu diisi oleh Javascript -->
            <div id="menu-container"></div> <!-- cite: 5 -->

            <!-- Navigasi Floating Bawah Menuju Keranjang -->
            <a href="cart.html" class="bottom-nav"> <!-- cite: 5 -->
                <div style="display: flex; align-items: center; gap: 12px;"> <!-- cite: 5 -->
                    <div class="cart-icon-wrapper"> <!-- cite: 5 -->
                        <span>🛒</span> <!-- cite: 5 -->
                        <div class="cart-badge" id="floating-badge">0</div> <!-- cite: 5 -->
                    </div>
                    <div>
                        <div style="font-size: 11px; opacity: 0.8;">Total Item</div> <!-- cite: 5 -->
                        <div style="font-size: 14px; font-weight: bold;" id="floating-amount">Rp 0</div> <!-- cite: 5 -->
                    </div>
                </div>
                <div style="font-size: 13px; font-weight: bold;">Keranjang ➡️</div> <!-- cite: 5 -->
            </a>

        </div>
        <div class="iphone-home-bar"></div> <!-- cite: 5 -->
    </div>
    <script src="script.js"></script> <!-- cite: 5 -->
</body>
</html>
